<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Questão 2</title>
</head>
<body>
   <h2>Questão 2</h2>
   
   <span>Quantidade de Energia Consumida (kWh): </span>
   <input type="text" id="input_kwh"> <br>

   <span>Bandeira Tarifária de Energia: </span>
   <input type="text" id="input_bandeira"> <br>

   <button onclick="calcular()">Calcular Despesa</button>

   <div id="div_mensagem"></div>
</body>
</html>

<script>
/* Faça sua lógica aqui! Não altere o HTML. */
function calcular() {
   let qtd_kwh = Number(input_kwh.value);
   let bandeira = input_bandeira.value;
   let despesa;

   if (bandeira == 'verde') {
      despesa = qtd_kwh * 0.75;
   } else if (bandeira == 'amarela') {
      despesa = qtd_kwh * 0.90;
   } else if (bandeira == 'vermelha') {
      despesa = qtd_kwh * 1.15;
   }

   if (qtd_kwh <= 100) {
      despesa = despesa * 0.85;
      console.log('Valor da bandeira:' + despesa);
   }

   div_mensagem.innerHTML = ` Com o consumo de ${qtd_kwh} kWh na bandeira ${bandeira}, a conta de energia totaliza R$${despesa}`;
}
</script>
