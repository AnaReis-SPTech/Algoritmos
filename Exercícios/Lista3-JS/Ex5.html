<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Ex.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <title>Cálculo da Média na SPTech</title>
</head>
<body>
    <div class="container">
        <div>
            <p>Qual é seu nome?</p> <br>
            <input type="text" id="id_nome">
            <br> <br>
            <p>Nota da Continuada:</p> <br>
            <input type="text" id="id_continuada">
            <br> <br>
            <p>Nota de Pesquisa e Inovação:</p> <br>
            <input type="text" id="id_pi">
        </div>
        <div>
            <button onclick="media()">Saiba sua Média!</button>
            <br> <br>
            <p id="paragrafo">Sua média aparecerá aqui!</p> 
        </div>
    </div>
</body>
<script>
    function media() {
        let nome = id_nome.value
        let continuada = Number(id_continuada.value);
        let pi = Number(id_pi.value);
        let media = ((continuada*0.4)+(pi*0.6));

        paragrafo.innerHTML = `A nota de ${nome} é ${media}.`;
    }
</script>
</html>
