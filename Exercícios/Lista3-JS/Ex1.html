<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="Ex.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <title>Aposentadoria: Quanto Falta?</title>
</head>
<body>
    <div class="container">
        <div class="pergunta">
            <p>Qual é a sua idade?</p>
            <br>
            <input type="text" id="id_idade">
        </div>
        <div id="botoes">
            <button onclick="aposentadoriaH()">Sou Homem!</button>
            <button onclick="aposentadoriaM()">Sou Mulher!</button>
        </div>
        
    </div>
</body>
<script>
    function aposentadoriaH() {
        let idade = Number(id_idade.value);
        resultadoH = (70 - idade);

        alert("Faltam " + resultadoH + " anos para a sua aposentadoria!");
    }

    function aposentadoriaM() {
        let idade = Number(id_idade.value);
        resultadoM = (60 - idade);

        alert("Faltam " + resultadoM + " anos para a sua aposentadoria!");
    }
</script>
</html>
