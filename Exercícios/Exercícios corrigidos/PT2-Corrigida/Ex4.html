<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Ex.css">
    <title>Ex4</title>
</head>
<body>
    <div class="container">
        <!-- input#id_nome_rua -->
        <!-- Atalho para criar algo com id -->
        <!--id_nome_rua = nome do id-->
        <span>Nome da Rua</span>
        <input type="text" id="id_nome_rua">
        <br>
        <span>Número</span>
        <input type="text" id="id_num_casa">
        <br>
        <button onclick="verificar()">Onde eu moro</button> 
    </div>
    

</body>
<script>
    function verificar() {
        let nome_rua = id_nome_rua.value
        let num_casa = id_num_casa.value
        alert("Seu logradouro é " + nome_rua + "\nO número do seu logradouro é " + num_casa)
    }
    // O \n pula linha no alert
    
</script>
