<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Virtual</title>
</head>
<body>
    <span>Valor aqui:</span>
    <input type="text" id="id_valor">
    <br><br>
    <button onclick="depositar()">Depositar</button>
    <button onclick="retirar()">Retirar</button>
</body>
<script>
    let saldo = 0;
    function depositar(){
        let valor = Number(id_valor.value);
        saldo = saldo + valor;
        //saldo += valor; dá no mesmo

        alert (`Depósito de R$${valor} efetuado! Saldo atual: R$${saldo}.`);
    }

    function retirar(){
        let valor = Number(id_valor.value);
        saldo = saldo - valor;

        alert (`Retirada de R$${valor} efetuada! Saldo atual: R$${saldo}.`);
    }
</script>
</html>
