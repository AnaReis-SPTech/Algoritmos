<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Café com Leite</h1>
    <p>Veja quantas xícaras de café com leite você já tomou na vida!</p>
    <label for="id_cafe">Quantas xícaras de café com leite você já tomou na vida?</label>
    <br>
    <input type="text" id="id_cafe">
    <br><br>
    <button onclick="CafeComLeite()"> Ver a Quantidade </button>
    <br><br>
    <div id="id_emojiLeite"></div>
    <div id="id_emojiCafe"></div>

</body>
<script>
    function CafeComLeite() {
        id_emojiLeite.innerHTML = ``;
        id_emojiCafe.innerHTML = ``;

        let qtdCafe = Number(id_cafe.value);

        for (let i = 0; i <= (qtdCafe - 2); i += 1) {
            if (i == 0) {
                id_emojiLeite.innerHTML += `${qtdCafe} 🥛`;
                id_emojiCafe.innerHTML += `${qtdCafe * 2} ☕☕`;
            }

            id_emojiLeite.innerHTML += `🥛`;
            id_emojiCafe.innerHTML += `☕☕`;
        }
    }
</script>
</html>
