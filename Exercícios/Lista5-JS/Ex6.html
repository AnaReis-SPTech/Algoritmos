<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Times Paulistas</h1>
    <p>Qual time de SP você torce? Valores válidos (São Paulo, Palmeiras, Corinthians, Santos).</p>
    <br>
    <label for="id_time">Seu time: </label>
    <input type="text" id="id_time" placeholder="Digite aqui seu time: ">
    <br><br>
    <button onclick="time()"> Fale sobre esse time </button>
    <br>
    <div id="resultado">
    </div>
</body>
<script>
    function time() {
        let time = id_time.value;

        if (time == "Corinthians") {
            resultado.innerHTML = `<p style="color: white; background-color: black;">Salve o Corinthians</p>`;
        } else if (time == "Palmeiras") {
            resultado.innerHTML = `<p style="color: white; background-color: green;">Salve o alviverde imponente</p>`;
        } else if (time == "Santos") {
            resultado.innerHTML = `<p>Agora quem dá a bola é o Santos</p>`;
        } else if (time == "São Paulo"){
            resultado.innerHTML = `<p style="color: red; background-color: black;">Salve o Tricolor paulista</p>`;
        } else {
            resultado.innerHTML = `<p style="color: red;">Time Inválido!</p>`;
        }
    }
</script>
</html>
