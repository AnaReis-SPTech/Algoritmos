<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
        <h1>Altura e Esportes</h1>
        <p>Qual esporte você tem boa altura para praticar?</p>
        <br>
        <label for="id_altura">Altura: </label>
        <input type="text" id="id_altura" placeholder="Digite sua altura: ">
        <br><br>
        <button onclick="analisar()"> Analisar Estatura </button>
        <br>
        <h3 id="id_resultado"></h3>
</body>
<script>
    function analisar() {
        let altura = Number(id_altura.value);

        if (altura <= 1.65) {
            id_resultado.innerHTML = `Você pode ser piloto de corrida`;
        } else if(altura <= 1.80) {
            id_resultado.innerHTML = `Você pode ser jogador de futebol`;
        } else if (altura > 1.80) {
            id_resultado.innerHTML = `Você pode ser jogador de vôlei ou basquete`;
        }
    }
</script>
</html>
