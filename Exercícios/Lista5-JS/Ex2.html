<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
        <h1>Classe Social Tuvalu</h1>
        <p>Em qual classe social em Tuvalu você se encaixa?</p>
        <br>
        <label for="id_renda">Renda Familiar: </label>
        <input type="text" id="id_renda" placeholder="Digite sua renda familiar: ">
        <br><br>
        <button onclick="analisar()"> Analisar Renda </button>
        <br>
        <h3 id="id_resultado"></h3>
</body>
<script>
    function analisar() {
        let renda = Number(id_renda.value);

        if (renda <= 250) {
            id_resultado.innerHTML = `Classe E`;
        } else if(renda <= 900) {
            id_resultado.innerHTML = `Classe D`;
        } else if (renda <= 2500) {
            id_resultado.innerHTML = `Classe C`;
        } else if (renda <= 9500) {
            id_resultado.innerHTML = `Classe B`;
        } else if (renda > 9500) {
            id_resultado.innerHTML = `Classe A`;
        } else {
            id_resultado.innerHTML = ``;
        }
    }
</script>
</html>
