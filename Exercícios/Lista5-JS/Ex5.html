<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Classificação de Alunos</h1>
    <p>Descubra como está seu desempenho!</p>
    <br>
    <label for="id_nota">Nota: </label>
    <input type="text" id="id_nota" placeholder="Digite sua nota: ">
    <br><br>
    <button onclick="analise()"> Classificar Aluno </button>
</body>
<script>
    function analise() {
        let nota = Number(id_nota.value);

        if (nota < 5) {
            alert("Aluno precisa de muita ajuda");
        } else if (nota <= 7) {
            alert("Aluno na média");
        } else if (nota <= 9.5) {
            alert("Aluno na acima da média");
        } else if (nota > 9.5) {
            alert("Aluno fora da curva");
        } else {
            alert("Nota Inválida!");
        }
    }
</script>
</html>
