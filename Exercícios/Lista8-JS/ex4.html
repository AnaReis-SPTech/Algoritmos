<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 - Ex4</title>
</head>
<body>
    <h1>S2 Pares</h1>
    <p>Crie um programa o qual:</p>
    <br>
    <button onclick="numero_pares()"> S2 Pares </button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function numero_pares() {
        let numero = 0;

        resultado.innerHTML = ``;

        while (numero <= 100) {
            resultado.innerHTML += `/ ${numero} / `;
            numero += 2
        }
    }
</script>
</html>
