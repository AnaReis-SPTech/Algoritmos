<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 - Ex5</title>
</head>
<body>
    <h1>Números Misteriosos</h1>
    <p>Crie um programa o qual:</p>
    <br>
    <button onclick="numeros()"> Números cabalísticos </button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function numeros() {
        let numero = 0;

        resultado.innerHTML = ``;

        while (numero < 30) {
            numero ++;
            if (numero != 3 && numero != 4 && numero != 7 && numero != 10 && numero != 12) {
                resultado.innerHTML += `${numero}<br>`;
            }
        }
    }
</script>
</html>
