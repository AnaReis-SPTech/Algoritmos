<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 - Ex3</title>
</head>
<body>
    <h1>Frase Numerada</h1>
    <p>Refaça o programa anterior de tal forma que, antes de cada frase apareça um contador.</p>
    <br>
    <button onclick="repetir()"> Diga algo sobre a matéria de Algoritmos </button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function repetir() {
        let numero_vezes = 0;

        resultado.innerHTML = ``;

        while (numero_vezes < 7) {
            resultado.innerHTML += `${numero_vezes + 1}° - A professora Giuliana ensina muito bem <br>`;
            numero_vezes ++;
        }
    }
</script>
</html>
