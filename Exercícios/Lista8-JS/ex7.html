<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 - Ex7</title>
</head>
<body>
    <h1>Viva o 7!</h1>
    <p>Crie um programa o qual:</p>
    <br>
    <label for="ipt_numero">Digite um número: </label>
    <input id="ipt_numero" placeholder="Entre 0 e 200..."></input>
    <br><br>
    <button onclick="multiplos()"> Viva o 7! </button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function multiplos() {
        let num_maximo = ipt_numero.value;
        let contador = 0;

        resultado.innerHTML = ``;

        if (num_maximo < 0 || num_maximo > 200) {
            alert(`O número precisa estar entre 0 e 200. \nDigite Novamente!`);
            location.reload()
        }

        while (contador <= num_maximo) {
            if ((contador % 7) == 0) {
                resultado.innerHTML += `${contador}<br>`;
                contador = contador + 7;
            }
        }
    }   
</script>
</html>
