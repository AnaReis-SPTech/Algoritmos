<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 - Ex9</title>
</head>
<body>
    <h1>Pares no Intervalo  </h1>
    <p>Crie um programa o qual:</p>
    <br>
    <label for="ipt_numero">Digite um número grande: </label>
    <input id="ipt_numero" placeholder="Digite aqui... "></input>
    <br><br>
    <button onclick="pares()"> S2 Pares </button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function pares() {
        let numero = ipt_numero.value;
        let frase_final = ``;
        
        resultado.innerHTML = ``;

        while (numero >= 0) {

            if ((numero % 2) == 0) {
              frase_final += `${numero}<br>`;
            }

            numero --;
        }

        resultado.innerHTML = `${frase_final}`;
    }
</script>
</html>
