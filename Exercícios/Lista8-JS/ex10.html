<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 - Ex10</title>
</head>
<body>
    <h1>Corrida de Voltas</h1>
    <p>Crie um programa o qual:</p>
    <br>
    <label for="ipt_numero">Digite númeor de voltas: </label>
    <input id="ipt_numero" placeholder="Digite aqui... "></input>
    <br><br>
    <button onclick="voltas()"> Iniciar corrida! </button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function voltas() {
        let num_max = ipt_numero.value;
        let contador = 0;
        
        resultado.innerHTML = ``;
        
        while (contador < num_max) {
            resultado.innerHTML += `Carro dando a ${contador + 1}° volta!<br>`;
            contador ++;
        }

        resultado.innerHTML += `Corrida finalizada!`;
    }
</script>
</html>
