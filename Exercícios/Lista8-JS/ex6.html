<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 - Ex6</title>
</head>
<body>
    <h1>Múltiplos de 5</h1>
    <p>Crie um programa o qual:</p>
    <br>
    <label for="ipt_numero">Digite um número: </label>
    <input id="ipt_numero" placeholder="Entre 20 e 100..."></input>
    <br><br>
    <button onclick="multiplos()"> Adoro múltiplos de 5 </button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function multiplos() {
        let num_maximo = ipt_numero.value;
        let contador = 0;

        resultado.innerHTML = ``;

        if (num_maximo < 20 || num_maximo > 100) {
            alert(`O número precisa estar entre 20 e 100. \nDigite Novamente!`);
            location.reload()
        }

        while (contador <= num_maximo) {
            if ((contador % 5) == 0) {
                resultado.innerHTML += `${contador}<br>`;
                contador = contador + 5;
            }
        }
    }
</script>
</html>
