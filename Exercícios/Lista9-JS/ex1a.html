<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1-A</title>
</head>

<body>
    <h1>Encontrar elementos duplicados</h1>
    <p>Crie um programa o qual:</p>
    <label for="ipt_add">Adicione um item ao vetor: </label>
    <input type="text" id="ipt_add">
    <br><br>
    <button onclick="adicionar()"> Adicionar </button>
    <p id="id_adicionar"></p>
    <br><br>
    <button onclick="exibir()"> Exibir Duplicados </button>
    <p id="id_exibir"></p>
    <button onclick="remover()"> Remover Duplicatas </button>
</body>
<script>
    let vetor = [];

    function adicionar() {
        let add = ipt_add.value;
        vetor.push(" " + add);
        id_adicionar.innerHTML = `Vetor = ` + vetor;
    }

    function exibir() {
        let lista_aux = [];
        let contador = 0;
        let dado_atual;

        for (let i = 0; i < vetor.length; i++) {
            
            contador = 0;
            dado_atual = vetor[i]

            for (let j = 0; j < vetor.length; j++) {

                if (vetor[i].includes(dado_atual)) {

                    contador++

                    if (contador > 1 && !lista_aux.includes(dado_atual)) {
                        lista_aux.push(dado_atual);
                    }

                }
            }
        }

        id_exibir.innerHTML = `Os itens repetidos são: ${lista_aux}`;
    }

    function remover() {
        
    }

</script>

</html>
