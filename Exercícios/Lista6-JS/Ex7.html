<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exercício 7</title>
</head>

<body>
    <div class="container">
        <div class="content-title">
            <h1>Autenticação Segura</h1>
            <p>Confira se voê tem acesso ao banco Melete!</p>
        </div>
        <div class="content-input">
            <label for="id_login">Login: </label>
            <input type="text" id="id_login" placeholder="Insira aqui..."> <br>
            <label for="id_senha">Senha: </label>
            <input type="password" id="id_senha" placeholder="Insira aqui..."> <br>
            <label for="id_informacao">Informação Pessoal: </label>
            <input type="password" id="id_informacao" placeholder="Insira aqui..."> <br>
            <div id="id_mensagem"></div>
        </div>
        <button onclick="autenticacao()"> Autenticar </button>
    </div>
</body>
<script>
    let tentativas = 3;
    function autenticacao() {
        let login = id_login.value;
        let senha = id_senha.value;
        let info = id_informacao.value;

        if (login == 'ana' && senha == 'braga' && info == '1949' || info == 'louro josé') {
            resultado = `Usuário autenticado`;
        } else {
            tentativas = tentativas - 1;
            resultado = `Falha na autenticação! Você ainda tem ${tentativas} tentativas.`;
        }

        if (tentativas == 0) {
            resultado = `Usuário BLOQUEADO! Procure seu gerente! `;
            tentativas = 1;
        }

        id_mensagem.innerHTML = resultado;
    }
</script>

</html>
