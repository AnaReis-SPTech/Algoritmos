<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Dados</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

    div {
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: left;
        align-items: center;
    }

    button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 200px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>
<body>
    <h1>Simular Partida de Dados</h1>
    <p>Simule uma partida de dados (D6) entre 2 jogadores e veja o status da partida!</p>
    <button onclick="simular()"> Simular Partida </button>
    <br>
    <div id="id_resultado"><b>Vitórias:</b></div>
</body>
<script>
    let win_p1 = 0;
    let win_p2 = 0;
    let empate = 0;
    function simular() {
        let numero_aleatorio_p1 = Math.random();
        let numero_aleatorio_p2 = Math.random();
        let min = 1;
        let max = 6;
        let dado_p1 = parseInt(numero_aleatorio_p1 * (max - min + 1) + min);
        let dado_p2 = parseInt(numero_aleatorio_p2 * (max - min + 1) + min);
        let stts_partida = ``;

        if (dado_p1 > dado_p2) {
            win_p1++
        } else if (dado_p1 < dado_p2) {
            win_p2++
        } else {
            empate++
        }

        if (win_p1 > win_p2) {
            stts_partida = `O jogador 1 está vencendo!`;
        } else if (win_p1 < win_p2) {
            stts_partida = `O jogador 2 está vencendo!`;
        } else {
            stts_partida = `O jogo está empatado!`;
        }

        id_resultado.innerHTML = `
        <b>Dado Player 1: ${dado_p1}</b>
        <b>Dado Player 2: ${dado_p2}</b>
        <br>
        <b>Vitórias:</b>
        Jogador 1: ${win_p1}  
        <br>
        Jogador 2: ${win_p2} 
        <br>
        Empate: ${empate}
        <br><br>
        <b>${stts_partida}</b>
        `;
    }
</script>
</html>
