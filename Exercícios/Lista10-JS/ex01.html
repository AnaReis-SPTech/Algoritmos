<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortear</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

    button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 200px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>

<body>
    <h1>Sorteio e Arredondamento</h1>
    <p>Sorteie um número de 0 à 0.9999 e descubra para qual número ele seria arredondado.</p>
    <button onclick="sorteio()"> Sortear </button>
    <p id="id_resultado"></p>
</body>
<script>
    function sorteio() {
        let numero_aleatorio = Math.random();
        let numero_aleatorio_formatado = numero_aleatorio.toFixed(4);

        if (numero_aleatorio_formatado > 0.5) {
            id_resultado.innerHTML = `O número sorteado foi: <b>${numero_aleatorio_formatado}</b> <br>Eu arredondaria para 1`;
        } else {
            id_resultado.innerHTML = `O número sorteado foi: <b>${numero_aleatorio_formatado}</b> <br>Eu arredondaria para 0`;
        }
    }
</script>

</html>
