<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sortear Números</title>
</head>
<style>
body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

    div {
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: left;
        align-items: center;
        font-size: 25px;
    }

        button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 200px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>
<body>
    <h1>Sortear Números</h1>
    <div id="id_contador">
        Números Pares: 0 <br>
        Números Ímpares: 0
    </div>
    <br>
    <button onclick="sortear()"> Sortear Número</button>
    <br>
    <div id="id_resultado"></div>
</body>
<script>
    let qtd_par = 0;
    let qtd_impar = 0;
    
    function sortear() {
        let numero_aleatorio = Math.random();
        let min = -30;
        let max = -9;
        let num = parseInt(numero_aleatorio * (max - min + 1) + min);

        if (num % 2 == 0) {
            qtd_par++
            id_resultado.innerHTML = `Número Sorteado: ${num}`;
            id_contador.innerHTML = `
                Números Pares: ${qtd_par} <br>
                Números Ímpares: ${qtd_impar}
            `
        } else {
            qtd_impar++
            id_resultado.innerHTML = `Número Sorteado: ${num}`;
            id_contador.innerHTML = `
                Números Pares: ${qtd_par} <br>
                Números Ímpares: ${qtd_impar}
            `;
        }
    }
</script>
</html>
