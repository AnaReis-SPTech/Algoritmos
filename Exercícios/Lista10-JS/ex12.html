<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortear Dados</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

    button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 200px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>

<body>
    <h1>Simular Avaliação</h1>
    <p>Simule a avaliação de um atendente!</p>
    <button onclick="avaliar()"> Avaliar </button>
    <div id="id_resultado"></div>
    <br>
    <button onclick="media()"> Verificar Média </button>
    <div id="id_media_geral"></div>
</body>
<script>
    let avaliacoes = [];

    function avaliar() {
        let min = 0;
        let max = 5.1;
        let nota = Math.random() * (max - min) + min;
        nota = nota.toFixed(1)

        if (nota <= 0.5) {
            id_resultado.innerHTML = `<p style="font-size: 35px;"><b>Nota recebida: </b>${nota}
            <br> 😭 Muito Triste</p>`
        } else if (nota <= 1.5) {
            id_resultado.innerHTML = `<p style="font-size: 35px;"><b>Nota recebida: </b>${nota}
            <br> 😟 Meio Triste</p>`
        } else if (nota <= 3.5) {
            id_resultado.innerHTML = `<p style="font-size: 35px;"><b>Nota recebida: </b>${nota}
            <br> 😐 Neutro</p>`
        } else if (nota <= 4.5) {
            id_resultado.innerHTML = `<p style="font-size: 35px;"><b>Nota recebida: </b>${nota}
            <br> 🙂 Feliz</p>`
        } else {
            id_resultado.innerHTML = `<p style="font-size: 35px;"><b>Nota recebida: </b>${nota}
            <br> 😁 Muito Feliz</p>`
        }

        avaliacoes.push(nota);
    }

    function media() {
        let media = 0;
        avaliacoes.join(',');
        
        for (let i = 0; i < avaliacoes.length; i++) {
            let somar = Number(avaliacoes[i]);
            media = media + somar;
            console.log(media);
        }

        media = media / (avaliacoes.length);
        media = media.toFixed(1);

        if (media <= 0.5) {
            id_media_geral.innerHTML = `<p style="font-size: 35px;"><b>Média Geral: </b>${media}
            <br> 😭 Muito Triste</p>`
        } else if (media <= 1.5) {
            id_media_geral.innerHTML = `<p style="font-size: 35px;"><b>Média Geral: </b>${media}
            <br> 😟 Meio Triste</p>`
        } else if (media <= 3.5) {
            id_media_geral.innerHTML = `<p style="font-size: 35px;"><b>Média Geral: </b>${media}
            <br> 😐 Neutro</p>`
        } else if (media <= 4.5) {
            id_media_geral.innerHTML = `<p style="font-size: 35px;"><b>Média Geral: </b>${media}
            <br> 🙂 Feliz</p>`
        } else {
            id_media_geral.innerHTML = `<p style="font-size: 35px;"><b>Média Geral: </b>${media}
            <br> 😁 Muito Feliz</p>`
        }
    }
</script>

</html>
