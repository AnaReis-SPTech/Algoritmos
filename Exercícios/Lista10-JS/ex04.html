<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortear Notas</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

        button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 300px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>
<body>
    <h1>Sorteio de Notas</h1>
    <p>Sorteie uma nota aleatória para alunos.</p>
    <button onclick="sorteio()"> Sortear Nota Para Aluno </button>
    <br><br>    
    <div id="id_resultado"></div>
</body>
<script>
    function sorteio() {
        let min = 0;
        let max = 10.01;
        let numero_com_intervalo = Math.random() * (max - min) + min;
        id_resultado.innerHTML = `${numero_com_intervalo.toFixed(2)}`;
    }
</script>
</html>
