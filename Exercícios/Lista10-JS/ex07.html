<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números Cabalísticos</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
        text-align: center;
    }

        button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 300px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>
<body>
    <h1>Sortear Números</h1>
    <p>Sorteie um número e descubra se ele é cabalístico.</p>
    <button onclick="sorteio()"> Quero um número cabalístico </button>
    <br><br>    
    <div id="id_resultado"></div>
</body>
<script>
    function sorteio() {
        let min = 1;
        let max = 16;
        let num = parseInt(Math.random() * (max - min) + min);

        if (num == 3 || num == 4 || num == 7 || num == 10 || num == 12) {
            id_resultado.innerHTML = `<div style="font-size: 30px;">${num}</div> <br> <b>Eu S2 números cabalísticos!</b>`;
        } else {
            id_resultado.innerHTML = `<div style="font-size: 30px;">${num}</div> <br> <b>Ah, me dá um número bom na próxima!</b>`;
        }

    }
</script>
</html>
