<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simular competição de Dados</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

        button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 300px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }

    .dado {
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        align-items: center;
        background-color: black;
        color: white;
        width: 100px;
        height: 100px;
        border-radius: 10px;
        font-size: 35px;
    }

    .container {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
        gap: 50px;
    }

    .jogador {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
</style>
<body>
    <h1>Simular Dados</h1>
    <p>Assista a uma competição de resultado de dados!</p>
    <div class="container">
        <div class="jogador">
            <button onclick="sorteio_p1()"> Dado Jogador 1 </button><br>
            <div id="id_player1"></div> <br>
        </div>
        <div class="jogador">
            <button onclick="sorteio_p2()"> Dado Jogador 2 </button><br>
            <div id="id_player2"></div>
        </div>
    </div>
    <button onclick="comparar()"> Comparar resultados </button> <br>
    <div id="id_comparar"></div>
</body>
<script>
    let num1 = 0;
    let num2 = 0;

    function sorteio_p1() {
        let min = 1;
        let max = 7;
        let num = parseInt(Math.random() * (max - min) + min);
        id_player1.innerHTML = `${num}`;

        id_player1.classList.add('dado');

        num1 = num;
    }

    function sorteio_p2() {
        let min = 1;
        let max = 7;
        let num = parseInt(Math.random() * (max - min) + min);
        id_player2.innerHTML = `${num}`;

        id_player2.classList.add('dado');
        
        num2 = num;
    }

    function comparar() {

        if (num1 > num2) {
            id_comparar.innerHTML = `Jogador 1 venceu!`;

        } else if (num2 > num1) {
            id_comparar.innerHTML = `Jogador 2 venceu!`;
        } else {
            id_comparar.innerHTML = `Empate!`;
        }

        if (num1 == 0 || num2 == 0) {
           id_comparar.innerHTML = `Sorteie a nota e a frequência antes!!!`;
        }
    }
</script>
</html>
