<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperatura</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

    div {
        text-align: center;
    }

    button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 300px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>
<body>
    <h1>Sortear Temperatura</h1>
    <p>Sorteie uma temperatura entre -20° e 20° e descubra se a temperatura é ideal para alimentos.</p>
    <button onclick="sorteio()"> Sortear Temperatura </button>
    <br><br>    
    <div id="id_resultado"></div>
</body>
<script>
    function sorteio() {
        let temp_aleatoria = Math.random();
        let min = -20;
        let max = 21;
        let temperatura = parseInt(temp_aleatoria * (max - min) + min);

        
        if (temperatura < 1) {
            id_resultado.innerHTML = `
                <div style="font-size: 20px;"><b>Temperatura sorteada</b></div>
                <div style="font-size: 35px;">${temperatura}</div>
                <div>Dá pra conservar qualquer alimento</div>
            `
        } else if (temperatura <= 10) {
            id_resultado.innerHTML = `
                <div style="font-size: 20px;"><b>Temperatura sorteada</b></div>
                <div style="font-size: 35px;">${temperatura}</div>
                <div>Conserva a maioria dos alimentos</div>
            `
        } else {
            id_resultado.innerHTML = `
                <div style="font-size: 20px;"><b>Temperatura sorteada</b></div>
                <div style="font-size: 35px;">${temperatura}</div>
                <div>Estraga a maioria dos alimentos</div>
            `
        }
    }
</script>
</html>
