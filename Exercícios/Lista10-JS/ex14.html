<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fases da Lua</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: black;
        background-color: white;
    }

    div {
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        align-items: center;
        font-size: 35px;
    }

        button {
        font-family: Arial, Helvetica, sans-serif;
        border: 2px solid black;
        width: 200px;
        height: 35px;
        background-color: white;
        border-radius: 50px;
        color: black;
        text-transform: uppercase;
        font-weight: 800;
        transition: all ease-in-out 0.3s;
    }

    button:hover {
        border: 2px solid white;
        background-color: black;
        color: white;
        transform: scale(1.05);
    }
</style>
<body>
    <h1>Sorteio de Fases da Lua</h1>
    <p>Sorteie um dia do mês e descubre qual a fase da lua nesse dia!</p>
    <button onclick="ver()"> Ver a Lua </button>
    <br><br>    
    <div id="id_resultado"></div>
</body>
<script>
    function ver() {
        let numero_aleatorio = Math.random();
        let min = 1;
        let max = 31;
        let fase_da_lua = parseInt(numero_aleatorio * (max - min + 1) + min);

        if (fase_da_lua <= 7) {
            id_resultado.innerHTML = `
                <p style="font-size: 20px;">Dia: ${fase_da_lua}</p>
                <div><b>Lua Nova!</b></div>
                <div>🌑</div>
            `
        } else if (fase_da_lua <= 16) {
            id_resultado.innerHTML = `
                <p style="font-size: 20px;">Dia: ${fase_da_lua}</p>
                <div><b>Lua Cheia!</b></div>
                <div>🌕</div>
            `
        } else if (fase_da_lua <= 22) {
            id_resultado.innerHTML = `
                <p style="font-size: 20px;">Dia: ${fase_da_lua}</p>
                <div><b>Lua Minguante!</b></div>
                <div>🌘</div>
            `
        } else {
            id_resultado.innerHTML = `
                <p style="font-size: 20px;">Dia: ${fase_da_lua}</p>
                <div><b>Lua Crescente!</b></div>
                <div>🌒</div>
            `
        }
    }
</script>
</html>
