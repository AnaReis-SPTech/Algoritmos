<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Análise de Financiamento Habitacional</h1>
    <p>Verifique se precisa complementar a sua renda!</p>
    <label for="id_valor_renda">Renda Familiar: </label>
    <input type="text" id="id_valor_renda" placeholder="Insira sua renda familiar: ">
    <br><br>
    <label for="id_prestacao">Valor da Prestação: </label>
    <input type="text" id="id_prestacao" placeholder="Insira o valor prestação: ">
    <br><br>
    <button onclick="porcentagem()"> Verificar Financiamento </button>
    <br>
    <h3 id="mensagem"></h3>
    <h3 id="mensagem2" style="color: rgb(212, 0, 0);"></h3>
</body>
<script>
    function porcentagem() {
        let renda_f = Number(id_valor_renda.value);
        let prestacao = Number(id_prestacao.value);
        let porcentagem = ((prestacao / renda_f) * 100);

        if (porcentagem > 30) {
            mensagem2.innerHTML = `<i><b>Será necessário complementar a renda familiar</i></b>`
            mensagem.innerHTML = `A prestação corresponde a ${porcentagem}% da renda familiar`;
        } else {
            mensagem.innerHTML = `A prestação corresponde a ${porcentagem}% da renda familiar`;
        }
    }
</script>
</html>
