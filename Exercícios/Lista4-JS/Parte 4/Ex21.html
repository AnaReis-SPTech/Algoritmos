<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 21</title>
</head>
<body>
    <h1>Sua Meta Econômica</h1>
    <p>Veja se alcançou sua meta ou não, além de quanto falta ou ultrapassou!</p>
    <label for="id_meta">Qual é sua meta economica?</label><br>
    <input type="text" id="id_meta" placeholder="Digite sua meta: ">
    <br><br>
    <label for="id_guardado">Quanto você tem guardado?</label><br>
    <input type="text" id="id_guardado" placeholder="Digite quanto já tem: ">
    <br><br>
    <button onclick="analise()"> Analisar Economia </button>
    <h3 id="id_mensagem"></h3>
    <h3 id="id_mensagem2"></h3>
</body>
<script>
    function analise() {
        let meta = Number(id_meta.value);
        let guardado = Number(id_guardado.value);
        let diferenca = guardado - meta;
        let falta = meta - guardado;

        if (diferenca >= 1) {
            id_mensagem.innerHTML = `Parabéns, meta alcançada!`;
            id_mensagem2.innerHTML = `Meta ultrapassada em ${diferenca}`;
        } else {
            if (diferenca == 0) {
                id_mensagem.innerHTML = `Parabéns, meta alcançada!`;
                id_mensagem2.innerHTML = ``;
            } else {
                id_mensagem.innerHTML = `Força! Ainda em busca da meta! Falta ${falta}`;
                id_mensagem2.innerHTML = ``;
            }   
        }
    }
</script>
</html>
