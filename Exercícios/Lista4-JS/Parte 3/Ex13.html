<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 13</title>
</head>
<body>
    <h1>Cálculo da média</h1>
    <p>Descubra se foi aprovado ou reprovado!</p>
    <label for="id_n1">1° Nota: </label>
    <input type="text" id="id_n1" placeholder="Escreva a 1° nota: ">
    <br><br>
    <label for="id_n2">2° Nota: </label>
    <input type="text" id="id_n2" placeholder="Escreva a 2° nota: ">
    <br><br>
    <button onclick="analise()"> Verificar situação </button>
    <br>
    <h3 id="id_mensagem"></h3>
</body>
<script>
    function analise() {
        let n1 = Number(id_n1.value);
        let n2 = Number(id_n2.value);
        let media = (n1 + n2) / 2;

        if (media >= 6) {
            id_mensagem.innerHTML = `Parabéns, aprovado!`;
        } else {
            id_mensagem.innerHTML = `Tente outra vez...`;
        }
    }
</script>
</html>
