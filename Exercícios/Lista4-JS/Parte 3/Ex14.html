<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    <h1>Auxílio da Autoescola</h1>
    <p>Você é um possível aluno? Descubra aqui!</p>
    <label for="id_nome"> Nome: </label>
    <input type="text" id="id_nome" placeholder="Insira seu nome:">
    <br><br>
    <label for="id_idade">Idade: </label>
    <input type="text" id="id_idade" placeholder="Insira sua idade: ">
    <br><br>
    <button onclick="analise()"> Avaliar Aluno </button>
    <br>
    <h3 id="mensagem"></h3>
</body>
<script>
    function analise() {
        let nome = id_nome.value;
        let idade = Number(id_idade.value);

        if (idade >= 18) {
            mensagem.innerHTML = `${nome}, vamos tirar a CNH?`;
        } else {
            mensagem.innerHTML = `${nome}, vai jogar Playstation!`;
        }
    }
</script>
</html>
