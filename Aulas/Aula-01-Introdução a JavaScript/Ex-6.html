<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <!-- Atividade de Intodução a JavaScript -->
    <!-- Algoritmos - Giuliana Franca -->
    <!-- Autor: Ana Carolina Viana Dos Reis -->

    <h1>Introdução a JavaScript</h1>
    <p>Farol</p>
    <br>
    <button onclick="pare()">Pare</button>
    <br>
    <button onclick="pense()">Pense</button>
    <br>
    <button onclick="siga()">Siga</button>
    <br>
    <p id="frase"></p>
</body>
    <script>
        function pare() {
            frase.innerHTML = 'Pare e aguarde!'
        }

        function pense() {
            frase.innerHTML = 'Pense se deve seguir ou se deve parar!'
        }

        function siga() {
            frase.innerHTML = 'Pode seguir adiante!'
        }
    </script>
</html>
