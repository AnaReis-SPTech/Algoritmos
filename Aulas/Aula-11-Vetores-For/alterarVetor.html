    <title>Alterando Vator</title>

</body>
<script>
    //             0      1      2      3      4
    let nomes = ["Bob", "Tom", "Mel", "Ana", "Dan"];
    console.log(`Nomes da lista: ${nomes}`);

    nomes[4] = "Novo Dan" // Troca o conteúdo do vetor seleionado
    nomes[5] = "Giuliana" // Se o indice não existe, ele cria novos vetores
    console.log(`Nomes da lista após alteração: ${nomes}`);
</script>
