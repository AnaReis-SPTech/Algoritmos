<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Calculadora SPFlix</h1>

  <div>
      <p>Qualidade (720p ou 1080p ou 4K):</p>
      <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>
</html>
<script>
function exibirResultado() {
  // Variáveis Parte 1
  let qualidade = ipt_qualidade.value;
  let mensagem = 'O valor base do seu plano é R$';
  let valor_base;

  // Variáveis Parte 2
  let qtd_telas = Number(ipt_qtd_telas.value);
  let qtd_telas_extra = Number(ipt_qtd_telas_extras.value);
  let valor_telas_extra = qtd_telas_extra * 12.90;
  let valor_telas;
  let calculo;

  // Variáveis Adicionais
  let valor_final;
  let qtd_telas_total;
  let div_telas;

  // Recebimento dos Valores Parte 1
  if (qualidade == '720p') {
      valor_base = 15.00;
    } else if (qualidade == '1080p') {
      valor_base = 20.00;
    } else if (qualidade == '4k') {
      valor_base = 25.00;
    }

  // Recebimento dos Valores Parte 2
  if (qtd_telas <= 2) {
      valor_telas = 10;
    } else if (qtd_telas <= 4) {
      valor_telas = 20;
    } else if (qtd_telas) {
      valor_telas = 30;
    };

    calculo = (valor_telas + valor_telas_extra);

    // Calculo da Parte 3
    valor_final = (calculo + valor_base);
    qtd_telas_total = (qtd_telas + qtd_telas_extra);
    div_telas = (valor_final / qtd_telas_total);

    // Exibição dos resultados

    div_mensagem.innerHTML = `
    ${mensagem}${valor_base.toFixed(2)} <br>
    O valor das telas do seu plano é R$${calculo.toFixed(2)} <br>
    Valor final: ${valor_final.toFixed(2)} <br>
    Se quiser dividir fica R$${div_telas.toFixed(2)} para cada!
    `;
}
</script>
